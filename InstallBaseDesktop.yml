---
- name: Preparando ambiente DevOps Linux Mint
  hosts: localhost
  connection: local
  become: true

  tasks:

  # =========================
  # Google Chrome
  # =========================

  - name: Baixar pacote Google Chrome
    ansible.builtin.get_url:
      url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
      dest: /tmp/google-chrome-stable_current_amd64.deb
      mode: '0644'


  - name: Instalar Google Chrome
    ansible.builtin.apt:
      deb: /tmp/google-chrome-stable_current_amd64.deb
      state: present


  - name: Remover pacote temporário Chrome
    ansible.builtin.file:
      path: /tmp/google-chrome-stable_current_amd64.deb
      state: absent



  # =========================
  # Pacotes APT
  # =========================

  - name: Atualizando pacotes
    ansible.builtin.apt:
      upgrade: full
      update_cache: yes


  - name: Instalando softwares via APT
    ansible.builtin.apt:
      name:
        - vim
        - htop
        - curl
        - wget
        - tree
        - git
        - python3-pip
        - terminator
        - docker.io
      state: present
      install_recommends: yes



  # =========================
  # Kubernetes / kubectl
  # =========================


  - name: Criar diretório de chave Kubernetes
    ansible.builtin.file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'


  - name: Baixar chave GPG Kubernetes
    ansible.builtin.get_url:
      url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
      dest: /etc/apt/keyrings/kubernetes.asc
      mode: '0644'


  - name: Adicionar repositório Kubernetes
    ansible.builtin.apt_repository:
      repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
      state: present
      filename: kubernetes


  - name: Atualizar cache APT Kubernetes
    ansible.builtin.apt:
      update_cache: yes


  - name: Instalar kubectl
    ansible.builtin.apt:
      name:
        - kubectl
      state: present



  # =========================
  # Docker
  # =========================


  - name: Habilitar Docker
    ansible.builtin.service:
      name: docker
      state: started
      enabled: yes



  # =========================
  # KIND
  # =========================


  - name: Instalar Kind
    ansible.builtin.get_url:
      url: https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
      dest: /usr/local/bin/kind
      mode: '0755'



  # =========================
  # Validação
  # =========================


  - name: Validar kubectl
    ansible.builtin.command:
      cmd: kubectl version --client
    register: kubectl_version
    changed_when: false


  - name: Mostrar kubectl
    ansible.builtin.debug:
      msg: "{{ kubectl_version.stdout }}"


  - name: Validar kind
    ansible.builtin.command:
      cmd: kind version
    register: kind_version
    changed_when: false


  - name: Mostrar kind
    ansible.builtin.debug:
      msg: "{{ kind_version.stdout }}"



  # =========================
  # Snap
  # =========================


  - name: Instalando softwares via Snap
    community.general.snap:
      name: "{{ item }}"
      classic: yes

    loop:
      - remmina
      - notion-snap
      - telegram-desktop
      - discord
      - teams-insiders
      - vlc
      - spotify
