---
- name: Preparando ambiente Desktop DevOps
  hosts: localhost
  connection: local
  become: true

  tasks:


    # =========================
    # Atualização do sistema
    # =========================

    - name: Atualizando pacotes
      ansible.builtin.apt:
        upgrade: full
        update_cache: yes



    # =========================
    # Liberar Snap no Linux Mint
    # =========================

    - name: Remover bloqueio do snap no Linux Mint
      ansible.builtin.file:
        path: /etc/apt/preferences.d/nosnap.pref
        state: absent


    - name: Atualizar cache APT após liberar Snap
      ansible.builtin.apt:
        update_cache: yes



    # =========================
    # Pacotes básicos
    # =========================

    - name: Instalando softwares via APT
      ansible.builtin.apt:
        name:
          - vim
          - snapd
          - htop
          - curl
          - wget
          - tree
          - git
          - python3-pip
          - terminator
          - ca-certificates
          - gnupg
        state: present
        install_recommends: yes
        update_cache: yes



    # =========================
    # Google Chrome
    # =========================

    - name: Baixar pacote Google Chrome
      ansible.builtin.get_url:
        url: https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        dest: /tmp/google-chrome-stable_current_amd64.deb
        mode: '0644'


    - name: Instalar Google Chrome
      ansible.builtin.apt:
        deb: /tmp/google-chrome-stable_current_amd64.deb
        state: present


    - name: Remover pacote temporário Chrome
      ansible.builtin.file:
        path: /tmp/google-chrome-stable_current_amd64.deb
        state: absent



    # =========================
    # Kubernetes / kubectl
    # =========================

    - name: Criar diretório keyrings Kubernetes
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'


    - name: Baixar chave GPG Kubernetes
      ansible.builtin.get_url:
        url: https://pkgs.k8s.io/core:/stable:/v1.30/deb/Release.key
        dest: /etc/apt/keyrings/kubernetes.asc
        mode: '0644'


    - name: Adicionar repositório Kubernetes
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.asc] https://pkgs.k8s.io/core:/stable:/v1.30/deb/ /"
        state: present
        filename: kubernetes


    - name: Atualizar cache Kubernetes
      ansible.builtin.apt:
        update_cache: yes


    - name: Instalar kubectl
      ansible.builtin.apt:
        name:
          - kubectl
        state: present



    # =========================
    # Docker CE Oficial
    # =========================

    - name: Criar diretório keyrings Docker
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'


    - name: Baixar chave GPG Docker
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Atualizar cache Docker
      ansible.builtin.apt:
        update_cache: yes


    - name: Instalar Docker Engine
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present



    - name: Habilitar Docker
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    # =========================
    # KIND Kubernetes local
    # =========================

    - name: Instalar Kind
      ansible.builtin.get_url:
        url: https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
        dest: /usr/local/bin/kind
        mode: '0755'



    # =========================
    # Snap Apps
    # =========================

    - name: Habilitar serviço snap
      ansible.builtin.service:
        name: snapd
        state: started
        enabled: yes


    - name: Instalando softwares via Snap
      community.general.snap:
        name: "{{ item }}"
        classic: yes
      loop:
        - remmina
        - telegram-desktop
        - discord
        - vlc
        - spotify



    # =========================
    # Validação
    # =========================

    - name: Validar kubectl
      ansible.builtin.command:
        cmd: kubectl version --client
      register: kubectl_version
      changed_when: false


    - name: Mostrar versão kubectl
      ansible.builtin.debug:
        msg: "{{ kubectl_version.stdout }}"


    - name: Validar Docker
      ansible.builtin.command:
        cmd: docker --version
      register: docker_version
      changed_when: false


    - name: Mostrar versão Docker
      ansible.builtin.debug:
        msg: "{{ docker_version.stdout }}"


    - name: Validar Kind
      ansible.builtin.command:
        cmd: kind version
      register: kind_version
      changed_when: false


    - name: Mostrar versão Kind
      ansible.builtin.debug:
        msg: "{{ kind_version.stdout }}"
